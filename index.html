<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL S45 | Carolina Hurricanes Central</title>
    <style>
        :root { --canes-red: #cc0000; --canes-black: #000000; --canes-silver: #a2aaad; --glass: rgba(255, 255, 255, 0.1); --glass-heavy: rgba(0, 0, 0, 0.85); }
        body { background-color: var(--canes-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; background-image: radial-gradient(circle at top right, #330000 0%, #000000 100%); min-height: 100vh; }
        header { background: linear-gradient(90deg, #000, var(--canes-red)); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--canes-silver); }
        nav { display: flex; background: #111; padding: 0 50px; gap: 10px; border-bottom: 1px solid #333; overflow-x: auto; }
        nav button { background: none; border: none; color: var(--canes-silver); cursor: pointer; font-weight: bold; text-transform: uppercase; padding: 15px 20px; transition: 0.3s; font-size: 1rem; white-space: nowrap; }
        nav button.active { color: var(--canes-red); border-bottom: 3px solid var(--canes-red); background: rgba(204, 0, 0, 0.1); }
        .container { padding: 30px 50px; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--glass); border: 1px solid #333; padding: 25px; border-radius: 12px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .list-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; transition: 0.2s; cursor: pointer; }
        .list-item:hover { background: rgba(204, 0, 0, 0.15); }
        .tag { background: #cc0000; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        h2 { border-left: 4px solid var(--canes-red); padding-left: 15px; text-transform: uppercase; font-size: 1.2rem; margin-bottom: 20px; }
        .status-bar { background: #cc0000; color: white; text-align: center; font-size: 0.8rem; padding: 5px; display: none; position: fixed; bottom: 0; width: 100%; z-index: 1000; }

        dialog { background: var(--glass-heavy); color: white; border: 1px solid var(--canes-red); border-radius: 15px; padding: 30px; width: 350px; backdrop-filter: blur(20px); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(3px); }
        .modal-header { margin-bottom: 20px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; color: white; transition: 0.2s; }
        .btn-role { background: #444; }
        .btn-role:hover { background: var(--canes-silver); color: black; }
        .btn-trade { background: #2980b9; }
        .btn-trade:hover { background: #3498db; }
        .btn-cut { background: #c0392b; }
        .btn-cut:hover { background: #e74c3c; }
        .btn-close { background: transparent; color: #888; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<div id="saveStatus" class="status-bar">Syncing with GitHub...</div>

<header>
    <div><h1 style="margin:0;">CAROLINA <span style="color:var(--canes-silver)">HURRICANES</span></h1><small>HNL SEASON 45 HUB</small></div>
</header>

<nav id="navbar">
    <button onclick="showTab('scores')" id="btn-scores" class="active">Scores</button>
    <button onclick="showTab('roster')" id="btn-roster">Roster & Lines</button>
    <button onclick="showTab('trades')" id="btn-trades">Trades</button>
    <button onclick="showTab('news')" id="btn-news">News</button>
</nav>

<div class="container">
    <section id="scores" class="tab-content active">
        <h2>Season Results</h2>
        <div id="scoresList" class="card"></div>
    </section>

    <section id="roster" class="tab-content">
        <h2>Gameday Lines</h2>
        <div class="card" style="border-left: 6px solid var(--canes-red);">
            <p><strong>1ST:</strong> <span id="l1" style="color:var(--canes-silver)"></span></p>
            <p><strong>2ND:</strong> <span id="l2" style="color:var(--canes-silver)"></span></p>
            <p><strong>G:</strong> <span id="lg" style="color:var(--canes-silver)"></span></p>
        </div>
        <h2>Active Roster</h2>
        <div id="rosterList" class="card"></div>
    </section>

    <section id="trades" class="tab-content">
        <h2>Trade Log</h2>
        <div id="tradesList" class="card"></div>
    </section>

    <section id="news" class="tab-content">
        <h2>Team News</h2>
        <div id="newsList"></div>
    </section>
</div>

<dialog id="playerModal">
    <div class="modal-header">
        <h3 id="modalPlayerName" style="margin:0;">Player Name</h3>
        <small id="modalPlayerPos" style="color: var(--canes-silver);">Position</small>
    </div>
    <button class="modal-btn btn-role" onclick="updateRole('[C]')">Assign Captain [C]</button>
    <button class="modal-btn btn-role" onclick="updateRole('[AC]')">Assign Alternate [AC]</button>
    <button class="modal-btn btn-role" onclick="updateRole('')">Remove Roles</button>
    <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
    <button class="modal-btn btn-trade" onclick="triggerTrade()">Trade Player</button>
    <button class="modal-btn btn-cut" onclick="triggerCut()">Cut Player</button>
    <button class="modal-btn btn-close" onclick="document.getElementById('playerModal').close()">Cancel</button>
</dialog>

<script>
    /* ---------------------------------------------------------
       ADMIN CONFIG
    --------------------------------------------------------- */
    const GITHUB_CONFIG = {
        owner: "coroiic",
        repo: "hnl-canes",
        path: "index.html",
        branch: "main"
    };

    let TEAM_DATA = {
    "lines": {
        "first": "Rowblox_lols, LucaskFortnite",
        "second": "Kreid - AlbertV05",
        "goalie": "TBD"
    },
    "scores": [
        {
            "opp": "WSH Capitals",
            "res": "1-0 W"
        },
        {
            "opp": "PIT Penguins",
            "res": "5-1 L"
        },
        {
            "opp": "OTT Senators",
            "res": "4-0 L"
        },
        {
            "opp": "NY Rangers",
            "res": "5-1 L"
        }
    ],
    "roster": [
        {
            "name": "Coroiic [C] ",
            "pos": "G"
        },
        {
            "name": "LucaskFortnite [AC]",
            "pos": "W"
        },
        {
            "name": "Rowblox_lols [AC]",
            "pos": "C"
        },
            "name": "TTV_Demolisher",
            "pos": "D"
        },
        {
            "name": "Lobsty",
            "pos": "D"
        },
        {
            "name": "Kreid",
            "pos": "C"
        },
        {
            "name": "AlbertV05",
            "pos": "W"
        },
        {
            "name": "CrusaderPenguin",
            "pos": "D"
        },
        {
            "name": "KevvyFr",
            "pos": "D"
        },
        {
            "name": "crabbyNT",
            "pos": "C"
        }
    ],
    "trades": [
        "🚨 No trades to report yet."
    ],
    "news": [
        {
            "h": "S45 Hub Live",
            "b": "The official Hurricanes HNL hub is now online."
        }
    ]
};

    let selectedPlayerIndex = null;

    /* ---------------------------------------------------------
       LINE CLEANING LOGIC
    --------------------------------------------------------- */
    function removeFromLines(rawName) {
        // Strip [C] and [AC] and trim whitespace
        const cleanName = rawName.replace(/\[C\]|\[AC\]/g, "").trim().toLowerCase();
        
        Object.keys(TEAM_DATA.lines).forEach(key => {
            let lineText = TEAM_DATA.lines[key];
            
            // Split the line by " - " to check individual players
            let playersOnLine = lineText.split(" - ");
            
            // Filter out the player that matches the cleanName (case insensitive)
            let updatedPlayers = playersOnLine.filter(p => p.trim().toLowerCase() !== cleanName);
            
            // Rejoin them. If empty, set to "TBD"
            TEAM_DATA.lines[key] = updatedPlayers.join(" - ") || "TBD";
        });
        
        renderLines();
    }

    /* ---------------------------------------------------------
       CORE FUNCTIONS
    --------------------------------------------------------- */
    function openPlayerActions(index) {
        selectedPlayerIndex = index;
        const player = TEAM_DATA.roster[index];
        document.getElementById('modalPlayerName').innerText = player.name;
        document.getElementById('modalPlayerPos').innerText = `Position: ${player.pos}`;
        document.getElementById('playerModal').showModal();
    }

    function updateRole(tag) {
        let name = TEAM_DATA.roster[selectedPlayerIndex].name;
        name = name.replace(/\[C\]|\[AC\]/g, "").trim();
        TEAM_DATA.roster[selectedPlayerIndex].name = tag ? `${name} ${tag}` : name;
        finishAction("Role Updated");
    }

    function triggerTrade() {
        const player = TEAM_DATA.roster[selectedPlayerIndex];
        if (confirm(`Move ${player.name} to the Trade Log?`)) {
            removeFromLines(player.name); // Remove from lines first
            TEAM_DATA.roster.splice(selectedPlayerIndex, 1);
            if (TEAM_DATA.trades[0].includes("🚨")) TEAM_DATA.trades = [];
            TEAM_DATA.trades.unshift(`🔄 TRADE: ${player.name} (${player.pos}) has been moved.`);
            finishAction("Player Traded");
        }
    }

    function triggerCut() {
        const code = prompt("Enter GM Code (999JUICEWRLD) to confirm cut:");
        if (code === "999JUICEWRLD") {
            const player = TEAM_DATA.roster[selectedPlayerIndex];
            removeFromLines(player.name); // Remove from lines first
            TEAM_DATA.roster.splice(selectedPlayerIndex, 1);
            finishAction(`${player.name} Released`);
        } else if (code !== null) {
            alert("Invalid Code.");
        }
    }

    function finishAction(msg) {
        document.getElementById('playerModal').close();
        renderRoster();
        renderTrades();
        saveToGitHub();
    }

    /* ---------------------------------------------------------
       GITHUB SYNC
    --------------------------------------------------------- */
    async function saveToGitHub() {
        const token = prompt("Syncing changes... Enter GitHub Token:");
        if (!token) return;

        const statusEl = document.getElementById('saveStatus');
        statusEl.style.display = 'block';

        try {
            const getUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
            const response = await fetch(getUrl);
            const fileData = await response.json();
            const sha = fileData.sha;

            let currentHTML = decodeURIComponent(escape(atob(fileData.content)));
            const dataRegex = /let TEAM_DATA = \{[\s\S]*?\};/;
            const newDataString = `let TEAM_DATA = ${JSON.stringify(TEAM_DATA, null, 4)};`;
            const updatedHTML = currentHTML.replace(dataRegex, newDataString);

            const putResponse = await fetch(getUrl, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "GM Action: Roster/Lines Updated",
                    content: btoa(unescape(encodeURIComponent(updatedHTML))),
                    sha: sha,
                    branch: GITHUB_CONFIG.branch
                })
            });

            if (putResponse.ok) alert("GitHub Updated Successfully!");
            else throw new Error("Sync Failed");
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            statusEl.style.display = 'none';
        }
    }

    /* ---------------------------------------------------------
       UI RENDERING
    --------------------------------------------------------- */
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function renderLines() {
        document.getElementById('l1').innerText = TEAM_DATA.lines.first;
        document.getElementById('l2').innerText = TEAM_DATA.lines.second;
        document.getElementById('lg').innerText = TEAM_DATA.lines.goalie;
    }

    function renderRoster() {
        const rList = document.getElementById('rosterList');
        rList.innerHTML = "";
        TEAM_DATA.roster.forEach((r, index) => {
            rList.innerHTML += `
                <div class="list-item" onclick="openPlayerActions(${index})">
                    <span>${r.name}</span>
                    <span class="tag">${r.pos}</span>
                </div>`;
        });
    }

    function renderTrades() {
        const tList = document.getElementById('tradesList');
        tList.innerHTML = "";
        TEAM_DATA.trades.forEach(t => {
            tList.innerHTML += `<div class="list-item">${t}</div>`;
        });
    }

    function init() {
        renderLines();
        const sList = document.getElementById('scoresList');
        sList.innerHTML = "";
        TEAM_DATA.scores.forEach(s => {
            sList.innerHTML += `<div class="list-item"><span>vs ${s.opp}</span><strong>${s.res}</strong></div>`;
        });
        renderRoster();
        renderTrades();
        const nList = document.getElementById('newsList');
        nList.innerHTML = "";
        TEAM_DATA.news.forEach(n => {
            nList.innerHTML += `<div class="card"><h3>${n.h}</h3><p>${n.b}</p></div>`;
        });
    }

    init();
</script>
</body>
</html>
