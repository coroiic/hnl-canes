<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL S45 | Carolina Hurricanes Central</title>
    <style>
        :root { --canes-red: #cc0000; --canes-black: #000000; --canes-silver: #a2aaad; --glass: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--canes-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; background-image: radial-gradient(circle at top right, #330000 0%, #000000 100%); min-height: 100vh; }
        header { background: linear-gradient(90deg, #000, var(--canes-red)); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--canes-silver); }
        nav { display: flex; background: #111; padding: 0 50px; gap: 10px; border-bottom: 1px solid #333; overflow-x: auto; }
        nav button { background: none; border: none; color: var(--canes-silver); cursor: pointer; font-weight: bold; text-transform: uppercase; padding: 15px 20px; transition: 0.3s; font-size: 1rem; white-space: nowrap; }
        nav button.active { color: var(--canes-red); border-bottom: 3px solid var(--canes-red); background: rgba(204, 0, 0, 0.1); }
        .container { padding: 30px 50px; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--glass); border: 1px solid #333; padding: 25px; border-radius: 12px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .list-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .tag { background: #cc0000; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-left: 10px; }
        h2 { border-left: 4px solid var(--canes-red); padding-left: 15px; text-transform: uppercase; font-size: 1.2rem; margin-bottom: 20px; }
        
        /* Stats Styling */
        .stats-grid { display: flex; gap: 15px; font-size: 0.85rem; color: var(--canes-silver); }
        .stat-val { color: white; font-weight: bold; margin-left: 3px; }
        .player-info { display: flex; align-items: center; }
    </style>
</head>
<body>

<header>
    <div><h1 style="margin:0;">CAROLINA <span style="color:var(--canes-silver)">HURRICANES</span></h1><small>HNL SEASON 45 HUB</small></div>
</header>

<nav id="navbar">
    <button onclick="showTab('scores')" id="btn-scores" class="active">Scores</button>
    <button onclick="showTab('roster')" id="btn-roster">Roster & Stats</button>
    <button onclick="showTab('trades')" id="btn-trades">Trades</button>
    <button onclick="showTab('news')" id="btn-news">News</button>
</nav>

<div class="container">
    <section id="scores" class="tab-content active">
        <h2>Season Results</h2>
        <div id="scoresList" class="card"></div>
    </section>

    <section id="roster" class="tab-content">
        <h2>Gameday Lines</h2>
        <div class="card" style="border-left: 6px solid var(--canes-red);">
            <p><strong>1ST:</strong> <span id="l1" style="color:var(--canes-silver)"></span></p>
            <p><strong>2ND:</strong> <span id="l2" style="color:var(--canes-silver)"></span></p>
            <p><strong>G:</strong> <span id="lg" style="color:var(--canes-silver)"></span></p>
        </div>
        <h2>Player Stats</h2>
        <div id="rosterList" class="card"></div>
    </section>

    <section id="trades" class="tab-content">
        <h2>Trade Log</h2>
        <div id="tradesList" class="card"></div>
    </section>

    <section id="news" class="tab-content">
        <h2>Team News</h2>
        <div id="newsList"></div>
    </section>
</div>

<script>
    /* ---------------------------------------------------------
       ADMIN: EDIT YOUR DATA HERE
    --------------------------------------------------------- */
    const TEAM_DATA = {
        lines: { 
            first: "Rowblox_Lols - LucaskFortnite", 
            second: "Kreid - AlbertV05", 
            goalie: "Coroiic" 
        },
        scores: [
            { opp: "WSH Capitals", res: "1-0 W" },
            { opp: "PIT Penguins", res: "5-1 L" },
            { opp: "OTT Senators", res: "4-0 L" },
            { opp: "NY Rangers", res: "5-1 L" }
        ],
        roster: [
            // GOALIE STATS: Use gaa, sv, and rec
            { name: "Coroiic [C]", pos: "G", gaa: "0.00", sv: "1.000", rec: "0-0-0" },
            
            // PLAYER STATS: Use g, a, pts, blk
            { name: "Rowblox_Lols [AC]", pos: "C", g: 0, a: 0, pts: 0, blk: 0 },
            { name: "LucaskFortnite [AC]", pos: "W", g: 0, a: 0, pts: 0, blk: 0 },
            { name: "TTV_Demolisher", pos: "D", g: 0, a: 0, pts: 0, blk: 0 },
            { name: "Lobsty", pos: "D", g: 0, a: 0, pts: 0, blk: 0 },
            { name: "Kreid", pos: "C", g: 0, a: 0, pts: 1, blk: 0 },
            { name: "AlbertV05", pos: "W", g: 0, a: 0, pts: 0, blk: 0 },
            { name: "CrusaderPenguin", pos: "D", g: 0, a: 0, pts: 0, blk: 0 },
            { name: "KevvyFr", pos: "D", g: 0, a: 0, pts: 0, blk: 0 }, 
            { name: "crabbyNT", pos: "C", g: 0, a: 0, pts: 0, blk: 0 }
        ],
        trades: [ "🚨 No trades to report yet." ],
        news: [ { h: "S45 Hub Live", b: "The official Hurricanes HNL hub is now online." } ]
    };

    /* ---------------------------------------------------------
       CORE LOGIC
    --------------------------------------------------------- */
    function showTab(id) {
        const tabs = document.getElementsByClassName('tab-content');
        const buttons = document.querySelectorAll('nav button');
        for (let i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
        for (let i = 0; i < buttons.length; i++) { buttons[i].classList.remove('active'); }
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function init() {
        document.getElementById('l1').innerText = TEAM_DATA.lines.first;
        document.getElementById('l2').innerText = TEAM_DATA.lines.second;
        document.getElementById('lg').innerText = TEAM_DATA.lines.goalie;

        // Scores
        const sList = document.getElementById('scoresList');
        sList.innerHTML = "";
        TEAM_DATA.scores.forEach(s => {
            sList.innerHTML += `<div class="list-item"><span>vs ${s.opp}</span><strong>${s.res}</strong></div>`;
        });

        // Roster & Stats Logic
        const rList = document.getElementById('rosterList');
        rList.innerHTML = "";
        TEAM_DATA.roster.forEach(r => {
            let statsHtml = "";
            
            if (r.pos === "G") {
                // Template for Goalie Stats
                statsHtml = `
                    <div class="stats-grid">
                        <span>GAA: <span class="stat-val">${r.gaa || '0.00'}</span></span>
                        <span>SV%: <span class="stat-val">${r.sv || '.000'}</span></span>
                        <span>REC: <span class="stat-val">${r.rec || '0-0-0'}</span></span>
                    </div>`;
            } else {
                // Template for Skater Stats
                statsHtml = `
                    <div class="stats-grid">
                        <span>G: <span class="stat-val">${r.g || 0}</span></span>
                        <span>A: <span class="stat-val">${r.a || 0}</span></span>
                        <span>P: <span class="stat-val">${r.pts || 0}</span></span>
                        <span>BLK: <span class="stat-val">${r.blk || 0}</span></span>
                    </div>`;
            }

            rList.innerHTML += `
                <div class="list-item">
                    <div class="player-info">
                        <strong>${r.name}</strong> <span class="tag">${r.pos}</span>
                    </div>
                    ${statsHtml}
                </div>`;
        });

        // Trades
        const tList = document.getElementById('tradesList');
        tList.innerHTML = "";
        TEAM_DATA.trades.forEach(t => { tList.innerHTML += `<div class="list-item">${t}</div>`; });

        // News
        const nList = document.getElementById('newsList');
        nList.innerHTML = "";
        TEAM_DATA.news.forEach(n => {
            nList.innerHTML += `<div class="card"><h3>${n.h}</h3><p>${n.b}</p></div>`;
        });
    }

    init();
</script>
</body>
</html>
