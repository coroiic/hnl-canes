<script>
    /* ---------------------------------------------------------
       ADMIN: EDIT YOUR DATA HERE
    --------------------------------------------------------- */
    const TEAM_DATA = {
        lines: { 
            first: "Rowblox_Lols - LucaskFortnite", 
            second: "Kreid - AlbertV05", 
            goalie: "Coroiic" 
        },
        scores: [
            { opp: "WSH Capitals", res: "1-0 W" },
            { opp: "PIT Penguins", res: "5-1 L" },
            { opp: "OTT Senators", res: "4-0 L" },
            { opp: "NY Rangers", res: "5-1 L" }
        ],
        roster: [
            { name: "Coroiic [C] ", pos: "G" },
            { name: "Rowblox_Lols [AC]", pos: "C" },
            { name: "LucaskFortnite [AC]", pos: "W" },
            { name: "TTV_Demolisher", pos: "D" },
            { name: "Lobsty", pos: "D" },
            { name: "Kreid", pos: "C" },
            { name: "AlbertV05", pos: "W" },
            { name: "CrusaderPenguin", pos: "D" },
            { name: "KevvyFr", pos: "D" }, 
            { name: "crabbyNT", pos: "C" }
        ],
        trades: [
            "🚨 No trades to report yet."
        ],
        news: [
            { h: "S45 Hub Live", b: "The official Hurricanes HNL hub is now online." }
        ]
    };

    /* ---------------------------------------------------------
       CORE LOGIC
    --------------------------------------------------------- */
    function showTab(id) {
        const tabs = document.getElementsByClassName('tab-content');
        const buttons = document.querySelectorAll('nav button');
        for (let i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
        for (let i = 0; i < buttons.length; i++) { buttons[i].classList.remove('active'); }
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    // New function specifically to render the roster so we can update it dynamically
    function renderRoster() {
        const rList = document.getElementById('rosterList');
        rList.innerHTML = "";
        
        // We pass the 'index' to the cutPlayer function so it knows exactly who to remove
        TEAM_DATA.roster.forEach((r, index) => {
            rList.innerHTML += `
                <div class="list-item" style="cursor: pointer; transition: background 0.2s;" onclick="cutPlayer(${index})" onmouseover="this.style.backgroundColor='rgba(204,0,0,0.2)'" onmouseout="this.style.backgroundColor='transparent'" title="Click to cut ${r.name}">
                    <span>${r.name}</span>
                    <span class="tag">${r.pos}</span>
                </div>`;
        });
    }

    // New function to handle the cutting logic
    function cutPlayer(index) {
        const player = TEAM_DATA.roster[index];
        const code = prompt(`WARNING: You are about to cut ${player.name}.\n\nEnter GM authorization code to proceed:`);

        if (code === "999JUICEWRLD") {
            // Remove 1 element at the specific index
            TEAM_DATA.roster.splice(index, 1);
            alert(`SUCCESS: ${player.name} has been released from the roster.`);
            // Re-render the list to show the updated roster
            renderRoster();
        } else if (code !== null) {
            // If they typed something wrong (and didn't just hit cancel)
            alert("ERROR: Invalid authorization code. Action denied.");
        }
    }

    function init() {
        // Load Lines
        document.getElementById('l1').innerText = TEAM_DATA.lines.first;
        document.getElementById('l2').innerText = TEAM_DATA.lines.second;
        document.getElementById('lg').innerText = TEAM_DATA.lines.goalie;

        // Load Scores
        const sList = document.getElementById('scoresList');
        sList.innerHTML = "";
        TEAM_DATA.scores.forEach(s => {
            sList.innerHTML += `<div class="list-item"><span>vs ${s.opp}</span><strong>${s.res}</strong></div>`;
        });

        // Load Roster (using our new function)
        renderRoster();

        // Load Trades
        const tList = document.getElementById('tradesList');
        tList.innerHTML = "";
        TEAM_DATA.trades.forEach(t => {
            tList.innerHTML += `<div class="list-item">${t}</div>`;
        });

        // Load News
        const nList = document.getElementById('newsList');
        nList.innerHTML = "";
        TEAM_DATA.news.forEach(n => {
            nList.innerHTML += `<div class="card"><h3>${n.h}</h3><p>${n.b}</p></div>`;
        });
    }

    init();
</script>
