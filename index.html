<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL S45 | Carolina Hurricanes Central</title>
    <style>
        :root { --canes-red: #cc0000; --canes-black: #000000; --canes-silver: #a2aaad; --glass: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--canes-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; background-image: radial-gradient(circle at top right, #330000 0%, #000000 100%); min-height: 100vh; }
        header { background: linear-gradient(90deg, #000, var(--canes-red)); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--canes-silver); }
        nav { display: flex; background: #111; padding: 0 50px; gap: 10px; border-bottom: 1px solid #333; overflow-x: auto; }
        nav button { background: none; border: none; color: var(--canes-silver); cursor: pointer; font-weight: bold; text-transform: uppercase; padding: 15px 20px; transition: 0.3s; font-size: 1rem; white-space: nowrap; }
        nav button.active { color: var(--canes-red); border-bottom: 3px solid var(--canes-red); background: rgba(204, 0, 0, 0.1); }
        .container { padding: 30px 50px; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--glass); border: 1px solid #333; padding: 25px; border-radius: 12px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .list-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .tag { background: #cc0000; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        h2 { border-left: 4px solid var(--canes-red); padding-left: 15px; text-transform: uppercase; font-size: 1.2rem; margin-bottom: 20px; }
        .status-bar { background: #cc0000; color: white; text-align: center; font-size: 0.8rem; padding: 5px; display: none; position: fixed; bottom: 0; width: 100%; z-index: 100; }
    </style>
</head>
<body>

<div id="saveStatus" class="status-bar">Updating GitHub... Please wait...</div>

<header>
    <div><h1 style="margin:0;">CAROLINA <span style="color:var(--canes-silver)">HURRICANES</span></h1><small id="sub-header">HNL SEASON 45 HUB</small></div>
</header>

<nav id="navbar">
    <button onclick="showTab('scores')" id="btn-scores" class="active">Scores</button>
    <button onclick="showTab('roster')" id="btn-roster">Roster & Lines</button>
    <button onclick="showTab('trades')" id="btn-trades">Trades</button>
    <button onclick="showTab('news')" id="btn-news">News</button>
</nav>

<div class="container">
    <section id="scores" class="tab-content active">
        <h2>Season Results</h2>
        <div id="scoresList" class="card"></div>
    </section>

    <section id="roster" class="tab-content">
        <h2>Gameday Lines</h2>
        <div class="card" style="border-left: 6px solid var(--canes-red);">
            <p><strong>1ST:</strong> <span id="l1" style="color:var(--canes-silver)"></span></p>
            <p><strong>2ND:</strong> <span id="l2" style="color:var(--canes-silver)"></span></p>
            <p><strong>G:</strong> <span id="lg" style="color:var(--canes-silver)"></span></p>
        </div>
        <h2>Active Roster</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">(Admin: Click a player to cut them from the team)</p>
        <div id="rosterList" class="card"></div>
    </section>

    <section id="trades" class="tab-content">
        <h2>Trade Log</h2>
        <div id="tradesList" class="card"></div>
    </section>

    <section id="news" class="tab-content">
        <h2>Team News</h2>
        <div id="newsList"></div>
    </section>
</div>

<script>
    /* ---------------------------------------------------------
       ADMIN: GITHUB SETTINGS
    --------------------------------------------------------- */
    const GITHUB_CONFIG = {
        owner: "coroiic", // Change this!
        repo: "hnl-canes",       // Change this!
        path: "index.html",            // The name of this file
        branch: "main"                 // Usually 'main' or 'master'
    };

    /* ---------------------------------------------------------
       DATA STORAGE
    --------------------------------------------------------- */
    let TEAM_DATA = {
        lines: { first: "Rowblox_Lols - LucaskFortnite", second: "Kreid - AlbertV05", goalie: "Coroiic" },
        scores: [
            { opp: "WSH Capitals", res: "1-0 W" },
            { opp: "PIT Penguins", res: "5-1 L" },
            { opp: "OTT Senators", res: "4-0 L" },
            { opp: "NY Rangers", res: "5-1 L" }
        ],
        roster: [
            { name: "Coroiic [C] ", pos: "G" },
            { name: "Rowblox_Lols [AC]", pos: "C" },
            { name: "LucaskFortnite [AC]", pos: "W" },
            { name: "TTV_Demolisher", pos: "D" },
            { name: "Lobsty", pos: "D" },
            { name: "Kreid", pos: "C" },
            { name: "AlbertV05", pos: "W" },
            { name: "CrusaderPenguin", pos: "D" },
            { name: "KevvyFr", pos: "D" }, 
            { name: "crabbyNT", pos: "C" }
        ],
        trades: ["🚨 No trades to report yet."],
        news: [{ h: "S45 Hub Live", b: "The official Hurricanes HNL hub is now online." }]
    };

    /* ---------------------------------------------------------
       GITHUB SAVING LOGIC
    --------------------------------------------------------- */
    async function saveToGitHub() {
        const token = prompt("Enter GitHub Personal Access Token to sync changes:");
        if (!token) return alert("Save cancelled. Changes will disappear on refresh.");

        const statusEl = document.getElementById('saveStatus');
        statusEl.style.display = 'block';

        try {
            // 1. Get the current file's SHA (GitHub needs this to update)
            const getUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
            const response = await fetch(getUrl);
            const fileData = await response.json();
            const sha = fileData.sha;

            // 2. Prepare the new file content
            // We take the current HTML and replace the OLD TEAM_DATA with the NEW TEAM_DATA
            let currentHTML = decodeURIComponent(escape(atob(fileData.content)));
            const dataRegex = /let TEAM_DATA = \{[\s\S]*?\};/;
            const newDataString = `let TEAM_DATA = ${JSON.stringify(TEAM_DATA, null, 4)};`;
            const updatedHTML = currentHTML.replace(dataRegex, newDataString);

            // 3. Push back to GitHub
            const putResponse = await fetch(getUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: `Admin: Cut player from roster`,
                    content: btoa(unescape(encodeURIComponent(updatedHTML))),
                    sha: sha,
                    branch: GITHUB_CONFIG.branch
                })
            });

            if (putResponse.ok) {
                alert("SUCCESS: Roster updated on GitHub! It may take 1-2 minutes for the site to refresh.");
            } else {
                const err = await putResponse.json();
                throw new Error(err.message);
            }
        } catch (error) {
            console.error(error);
            alert("FAILED TO SAVE: " + error.message);
        } finally {
            statusEl.style.display = 'none';
        }
    }

    /* ---------------------------------------------------------
       UI LOGIC
    --------------------------------------------------------- */
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function renderRoster() {
        const rList = document.getElementById('rosterList');
        rList.innerHTML = "";
        TEAM_DATA.roster.forEach((r, index) => {
            rList.innerHTML += `
                <div class="list-item" style="cursor: pointer;" onclick="cutPlayer(${index})">
                    <span>${r.name}</span>
                    <span class="tag">${r.pos}</span>
                </div>`;
        });
    }

    async function cutPlayer(index) {
        const player = TEAM_DATA.roster[index];
        const code = prompt(`Cut ${player.name}?\nEnter Authorization Code:`);

        if (code === "999JUICEWRLD") {
            TEAM_DATA.roster.splice(index, 1);
            renderRoster();
            // Trigger the GitHub Save
            await saveToGitHub();
        } else if (code !== null) {
            alert("Invalid Code.");
        }
    }

    function init() {
        document.getElementById('l1').innerText = TEAM_DATA.lines.first;
        document.getElementById('l2').innerText = TEAM_DATA.lines.second;
        document.getElementById('lg').innerText = TEAM_DATA.lines.goalie;

        const sList = document.getElementById('scoresList');
        sList.innerHTML = "";
        TEAM_DATA.scores.forEach(s => {
            sList.innerHTML += `<div class="list-item"><span>vs ${s.opp}</span><strong>${s.res}</strong></div>`;
        });

        renderRoster();

        const tList = document.getElementById('tradesList');
        tList.innerHTML = "";
        TEAM_DATA.trades.forEach(t => {
            tList.innerHTML += `<div class="list-item">${t}</div>`;
        });

        const nList = document.getElementById('newsList');
        nList.innerHTML = "";
        TEAM_DATA.news.forEach(n => {
            nList.innerHTML += `<div class="card"><h3>${n.h}</h3><p>${n.b}</p></div>`;
        });
    }

    init();
</script>
</body>
</html>
